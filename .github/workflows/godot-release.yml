name: Godot Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to publish assets to"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GODOT_VERSION: "4.6.2"
  GODOT_STATUS: "stable"
  PROJECT_NAME: "EchoesOfTeyvat"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  WEB_BUILD_URL: "https://yogeshprasad098.github.io/echoes-of-teyvat/"

jobs:
  windows-export:
    name: Export Windows build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip

      - name: Download Godot editor and export templates
        run: |
          set -euo pipefail
          release="${GODOT_VERSION}-${GODOT_STATUS}"
          base="Godot_v${release}"
          url="https://github.com/godotengine/godot-builds/releases/download/${release}"

          curl --fail --location --retry 3 --output godot.zip "${url}/${base}_linux.x86_64.zip"
          curl --fail --location --retry 3 --output export_templates.tpz "${url}/${base}_export_templates.tpz"

          unzip -q godot.zip
          mv "${base}_linux.x86_64" godot
          chmod +x godot

      - name: Install Godot export templates
        run: |
          set -euo pipefail
          unzip -q export_templates.tpz
          template_dir="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "${template_dir}"
          cp -R templates/* "${template_dir}/"

      - name: Import project resources
        run: ./godot --headless --path . --import --quit

      - name: Export Windows build
        run: |
          set -euo pipefail
          mkdir -p builds/windows
          ./godot --headless --path . --export-release "Windows Desktop" "builds/windows/${PROJECT_NAME}.exe"

      - name: Package release files
        run: |
          set -euo pipefail
          mkdir -p dist
          (cd builds/windows && zip -r "../../dist/${PROJECT_NAME}-windows-x86_64.zip" .)

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*.zip
          if-no-files-found: error

  web-deploy:
    name: Deploy Web build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download Godot editor and export templates
        run: |
          set -euo pipefail
          release="${GODOT_VERSION}-${GODOT_STATUS}"
          base="Godot_v${release}"
          url="https://github.com/godotengine/godot-builds/releases/download/${release}"

          curl --fail --location --retry 3 --output godot.zip "${url}/${base}_linux.x86_64.zip"
          curl --fail --location --retry 3 --output export_templates.tpz "${url}/${base}_export_templates.tpz"

          unzip -q godot.zip
          mv "${base}_linux.x86_64" godot
          chmod +x godot

      - name: Install Godot export templates
        run: |
          set -euo pipefail
          unzip -q export_templates.tpz
          template_dir="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "${template_dir}"
          cp -R templates/* "${template_dir}/"

      - name: Import project resources
        run: ./godot --headless --path . --import --quit

      - name: Export Web build
        run: |
          set -euo pipefail
          mkdir -p builds/web
          ./godot --headless --path . --export-release "Web" builds/web/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - windows-export
      - web-deploy

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist

      - name: Publish GitHub release
        if: ${{ github.ref_type == 'tag' || inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          notes="$(printf "Windows build attached below.\n\nPlay the Web build on GitHub Pages:\n%s\n" "${WEB_BUILD_URL}")"

          if gh release view "${RELEASE_TAG}" --repo "${RELEASE_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --repo "${RELEASE_REPOSITORY}" --notes "${notes}"
            gh release upload "${RELEASE_TAG}" dist/*.zip --repo "${RELEASE_REPOSITORY}" --clobber
          else
            gh release create "${RELEASE_TAG}" dist/*.zip \
              --repo "${RELEASE_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "Echoes of Teyvat ${RELEASE_TAG}" \
              --notes "${notes}"
          fi
