name: Godot Web Page

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.2"
  GODOT_STATUS: "stable"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  export-web:
    name: Export Web build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download Godot editor and export templates
        run: |
          set -euo pipefail
          release="${GODOT_VERSION}-${GODOT_STATUS}"
          base="Godot_v${release}"
          url="https://github.com/godotengine/godot-builds/releases/download/${release}"

          curl --fail --location --retry 3 --output godot.zip "${url}/${base}_linux.x86_64.zip"
          curl --fail --location --retry 3 --output export_templates.tpz "${url}/${base}_export_templates.tpz"

          unzip -q godot.zip
          mv "${base}_linux.x86_64" godot
          chmod +x godot

      - name: Install Godot export templates
        run: |
          set -euo pipefail
          unzip -q export_templates.tpz
          template_dir="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "${template_dir}"
          cp -R templates/* "${template_dir}/"

      - name: Import project resources
        run: ./godot --headless --path . --import --quit

      - name: Export Web build
        run: |
          set -euo pipefail
          mkdir -p builds/web
          ./godot --headless --path . --export-release "Web" builds/web/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
